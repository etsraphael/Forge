name: Lint & Format Check

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            forge-fe/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix forge-fe

      - name: Run ESLint (server)
        run: npx eslint .

      - name: Check Prettier formatting (server)
        run: npx prettier --check "server/**/*.js"

      - name: Run ESLint (frontend)
        run: npm run lint --prefix forge-fe

      - name: Check Prettier formatting (frontend)
        run: npm run format:check --prefix forge-fe
